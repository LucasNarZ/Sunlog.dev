name: Deploy to Production

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  DEPLOY_HOST: ${{ vars.DEPLOY_HOST || '46.202.150.9' }}
  DEPLOY_USER: ${{ vars.DEPLOY_USER || 'deploy' }}
  APP_URL: ${{ vars.APP_URL || 'https://sunlog.dev' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.APP_URL || 'https://sunlog.dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          printf '%s\n' "${{ secrets.ENV_FILE }}" > .env

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build images
        run: |
          docker compose --env-file .env -f infra/docker-compose.yml -f infra/docker-compose.prod.yml build

      - name: Push images to ECR
        uses: nick-invision/retry@v2
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            docker compose --env-file .env -f infra/docker-compose.yml -f infra/docker-compose.prod.yml push

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configure known_hosts
        env:
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          if [ -z "$SSH_KNOWN_HOSTS" ]; then
            echo "SSH_KNOWN_HOSTS secret is required for host verification." >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Set deploy script permissions
        uses: nick-invision/retry@v2
        with:
          timeout_minutes: 2
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            ssh -o ConnectTimeout=30 \
                -o ServerAliveInterval=60 \
                ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} \
                'chmod +x ./Sunlog.dev/scripts/deploy.sh'

      - name: Deploy to server
        uses: nick-invision/retry@v2
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            ssh -o ConnectTimeout=30 \
                -o ServerAliveInterval=60 \
                ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} \
                './Sunlog.dev/scripts/deploy.sh'

      - name: Verify frontend health
        run: curl --fail --silent --show-error --location --retry 5 --retry-delay 10 ${{ env.APP_URL }}

      - name: Verify API health
        run: curl --fail --silent --show-error --location --retry 5 --retry-delay 10 ${{ env.APP_URL }}/api
