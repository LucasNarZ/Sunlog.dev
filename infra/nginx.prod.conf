worker_processes auto;

events {
    use epoll;
    worker_connections 1000;
}

http {
    server_tokens off;
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
    client_max_body_size 1M;

    server {
        listen 80;
        server_name sunlog.dev www.sunlog.dev;

        location /google-certs/ {
            proxy_pass https://www.googleapis.com/oauth2/v1/certs;
            proxy_ssl_server_name on;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            proxy_set_header Host www.googleapis.com;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Accept "application/json";
            proxy_set_header User-Agent "nginx-proxy";
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        limit_req zone=api burst=20 nodelay;

        # Frontend
        location / {
            proxy_pass http://front-end:3000;
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }

        # API
        location /api/ {
            proxy_pass http://api;
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }

        # Grafana
        location /grafana/ {
            proxy_pass http://grafana:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_redirect off;
        }

        # Bloqueia arquivos sensíveis
        location ~ /\.(git|env|htaccess|htpasswd) {
            deny all;
        }
    }

    upstream api {
        server api:3000;
    }

}
